kind = "web"
previewPath = "/"
title = "Gilliam Insurance Services"
version = "1.0.0"
id = "artifacts/gilliam-insurance"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20807

[services.development]
run = "pnpm --filter @workspace/gilliam-insurance run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/gilliam-insurance", "run", "build" ]
publicDir = "artifacts/gilliam-insurance/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20807"
BASE_PATH = "/"
